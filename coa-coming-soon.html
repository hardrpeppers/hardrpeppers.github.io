<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HardRPeppers | COA Coming Soon</title>
  <link rel="stylesheet" href="assets/css/style.css?v=2">
</head>
<body>
  <div class="background-glow" aria-hidden="true"></div>

  <nav class="site-nav" aria-label="Primary navigation">
    <a class="site-nav__brand" href="index.html">HardRPeppers</a>
    <button class="site-nav__toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="primary-nav-links">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="site-nav__links" id="primary-nav-links">
      <a href="index.html#home">Home</a>
      <a href="index.html#research">Research</a>
      <a href="products.html">Products</a>
      <a href="coas.html" class="is-active">COAs</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </nav>

  <main class="page-shell">
    <section class="page-hero reveal" aria-label="COA status">
      <p class="eyebrow">Certificates of Analysis</p>
      <h1>COA Coming Soon</h1>
      <p class="page-hero__text">The COA for <strong id="coa-product-name">this product</strong> is currently being finalized. Please check back soon or contact our team for priority support.</p>
      <div class="hero__actions" style="justify-content: center; margin-top: 1rem;">
        <a href="coas.html" class="button button--primary">Browse Available COAs</a>
        <a href="index.html#contact" class="button button--secondary">Contact Support</a>
      </div>
    </section>
  </main>

  <script src="assets/js/script.js?v=2"></script>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const product = params.get('product');
      const target = document.getElementById('coa-product-name');
      if (target && product) {
        target.textContent = product;
      }
    })();
  </script>
</body>
</html>
